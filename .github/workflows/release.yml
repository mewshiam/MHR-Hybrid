name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (example: v1.0.0)'
        required: true
        type: string

jobs:
  validate:
    name: Validate release inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          VERSION="$(printf '%s' "$VERSION" | tr -d '[:space:]')"

          if ! printf '%s' "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Invalid version format: $VERSION"
            echo "Expected format: vMAJOR.MINOR.PATCH (example: v1.0.0)"
            exit 1
          fi

  build:
    name: Build ${{ matrix.platform }} release artifacts
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
          - platform: windows
            runner: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare release bundle
        shell: bash
        env:
          VERSION: ${{ github.event.inputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          mkdir -p dist

          if [ "$PLATFORM" = "linux" ]; then
            git archive --format=tar.gz --output="dist/MHR-Hybrid-${VERSION}-linux.tar.gz" HEAD
            cp config.example.json "dist/config.example-${VERSION}-linux.json"
            cp run.sh "dist/run-${VERSION}-linux.sh"
          elif [ "$PLATFORM" = "windows" ]; then
            git archive --format=zip --output="dist/MHR-Hybrid-${VERSION}-windows.zip" HEAD
            cp config.example.json "dist/config.example-${VERSION}-windows.json"
            cp run.bat "dist/run-${VERSION}-windows.bat"
          else
            echo "Unsupported platform: $PLATFORM"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}-${{ github.event.inputs.version }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*-${{ github.event.inputs.version }}
          merge-multiple: true
          path: dist

      - name: Create and push git tag
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists locally."
          else
            git tag "$VERSION" "${GITHUB_SHA}"
          fi

          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q "$VERSION"; then
            echo "Tag $VERSION already exists on origin."
          else
            git push origin "$VERSION"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: dist/*
          generate_release_notes: true
